<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <link rel="icon" type="image/svg+xml" href="./src/assets/favicon.svg">
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Bluish</title>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="./style.css">
    </head>

    <body class="bg-brand-black text-white selection:bg-brand-accent/30"> 

        <div id="app" class="relative min-h-screen flex flex-col items-center justify-center overflow-hidden"></div>

        <div class="fixed inset-0 overflow-hidden pointer-events-none z-[1]">
            <div id="ambient-glow" class="absolute inset-0 bg-[radial-gradient(circle_at_center,transparent_40%,rgba(34,211,238,0.2)_100%)] opacity-0 transition-opacity duration-1000"></div>
            <div class="absolute top-[-10%] left-[-10%] w-[30%] h-[30%] bg-cyan-400/40 blur-[120px] rounded-full animate-pulse-slow mix-blend-plus-lighter"></div>
            <div class="absolute bottom-[-10%] right-[-10%] w-[30%] h-[30%] bg-cyan-500/30 blur-[120px] rounded-full animate-pulse-slow mix-blend-plus-lighter" style="animation-delay: 3s;"></div>
        </div>

        <video id="bg-video" class="absolute inset-0 w-full h-full object-cover opacity-30 pointer-events-none z-1" loop muted playsinline>
            <source src="./src/assets/clip2.mp4" type="video/mp4">
        </video>

        <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,transparent_0%,#020617_80%)] pointer-events-none z-2"></div>

        <script type="module" src="/src/main.js"></script>
    </body>
</html>
