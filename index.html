<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <link rel="icon" type="image/svg+xml" href="/vite.svg">
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Bluish - Interactive Experience</title>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="./style.css">

    <body class="bg-brand-black text-white selection:bg-brand-accent/30 overflow-hidden">

        <div id="app" class="relative min-h-screen flex flex-col items-center justify-center overflow-hidden">
            <div class="absolute -top-20 -left-20 w-80 h-80 bg-brand-accent/30 rounded-full blur-[100px] animate-glow pointer-events-none"></div>
        </div>

        <!-- <div class="absolute -top-[10%] -left-[10%] w-[50vw] h-[50vw]

        <div class="absolute -bottom-[15%] -right-[15%] w-[60vw] h-[60vw] 
            bg-blue-600/30 rounded-full animate-glow pointer-events-none z-0" 
            style="animation-delay: -5s;"></div> -->

        <video id="bg-video" class="absolute inset-0 w-full h-full object-cover opacity-30 pointer-events-none z-1" loop muted playsinline>
            <source src="./src/assets/clip2.mp4" type="video/mp4">
        </video>

        <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,transparent_0%,#020617_80%)] pointer-events-none z-2"></div>

        <script type="module" src="/src/main.js"></script>

</html>
