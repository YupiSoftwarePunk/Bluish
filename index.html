<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <link rel="icon" type="image/svg+xml" href="/vite.svg">
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Bluish - Interactive Experience</title>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="./style.css">
    </head>

    <body class="bg-brand-black text-white selection:bg-brand-accent/30 overflow-hidden">

        <div id="app" class="relative min-h-screen flex flex-col items-center justify-center overflow-hidden">
        
        <video id="bg-video" class="absolute inset-0 w-full h-full object-cover opacity-20 pointer-events-none transition-opacity duration-1000" loop muted playsinline>
            <source src="./src/assets/videoplayback.mp4" type="video/mp4">
        </video>

        <div class="absolute inset-0 bg-radial-gradient from-brand-dark/50 to-brand-black pointer-events-none"></div>
            <main class="relative z-10 flex flex-col items-center text-center space-y-8 px-4">
                <header class="animate-pulse-slow">
                    <h1 class="text-6xl md:text-8xl font-bold tracking-tighter text-brand-accent glow-text">
                    BLUISH
                    </h1>
                    <p class="text-brand-muted uppercase tracking-[0.5em] text-sm mt-4">Father of Peace</p>
                </header>

                <section id="lyrics-display" class="h-32 flex items-center justify-center">
                    <p id="current-line" class="text-2xl md:text-4xl font-light italic opacity-80 transition-all duration-700">
                    Нажми Play, чтобы начать...
                    </p>
                </section>

                <section class="glass-panel p-6 rounded-full flex items-center gap-6">
                    <audio id="main-track" src="./src/assets/Father of Peace - Bluish.flac"></audio>
                    
                    <button id="play-btn" class="w-16 h-16 bg-brand-accent rounded-full flex items-center justify-center text-brand-black hover:scale-110 active:scale-95 transition-transform shadow-[0_0_30px_rgba(56,189,248,0.4)]">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" width="32" height="32"><path d="M8 5v14l11-7z"/></svg>
                    </button>
                </section>
            </main>
        </div>

        <script type="module" src="/src/main.js"></script>
    </body>
</html>
